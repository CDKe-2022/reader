<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>极简阅读器 v1.3</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4F1EA">

<script>
  // 预加载主题，防止闪烁
  (function() {
    try {
      const s = JSON.parse(localStorage.getItem('reader_settings_v13') || '{}');
      document.documentElement.setAttribute('data-theme', s.theme || 'default');
      document.documentElement.setAttribute('data-font', s.fontMode || 'sans');
    } catch(e) {}
  })();
</script>

<style>
/* --- Design Tokens & System --- */
:root {
  --sat: env(safe-area-inset-top);
  --sab: env(safe-area-inset-bottom);
  --header-h: 60px;
  --content-max-w: 720px;
  
  /* Spacing */
  --space-xs: 4px; --space-s: 8px; --space-m: 12px; --space-l: 24px;
  
  /* Radius */
  --radius-s: 8px; --radius-m: 12px; --radius-l: 20px; --radius-xl: 24px;

  /* Fonts */
  --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif;
  --font-serif: ui-serif, "Songti SC", "Noto Serif SC", serif;
  
  /* Transitions */
  --ease-out: cubic-bezier(0.215, 0.61, 0.355, 1);
  --trans-fast: 0.2s var(--ease-out);
  --trans-med: 0.3s var(--ease-out);
}

/* --- Theme: Default (Paper) --- */
[data-theme="default"] {
  --bg: #F4F1EA; --text: #2D2D2D; --text-sub: #888888;
  --card: rgba(255,255,255,0.65); --card-border: rgba(0,0,0,0.04);
  --header-bg: rgba(244, 241, 234, 0.9);
  --accent: #9C8163; --accent-glow: rgba(156, 129, 99, 0.15);
  --shadow-card: 0 8px 24px rgba(0,0,0,0.04);
  --shadow-float: 0 12px 32px rgba(0,0,0,0.08);
  --scroll-thumb: rgba(0,0,0,0.2);
}

/* --- Theme: OLED Dark (Pure Black) --- */
[data-theme="dark"] {
  --bg: #000000; --text: #E0E0E0; --text-sub: #6e6e73;
  --card: #121212; --card-border: rgba(255,255,255,0.08);
  --header-bg: rgba(0, 0, 0, 0.9);
  --accent: #D4AF37; --accent-glow: rgba(212, 175, 55, 0.15);
  --shadow-card: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-float: 0 8px 24px rgba(0,0,0,0.5);
  --scroll-thumb: rgba(255,255,255,0.2);
}

/* --- Global Styles --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-sans); transition: background .4s, color .4s, font-family .3s; }
/* Serif Mode */
[data-font="serif"] body { font-family: var(--font-serif); letter-spacing: 0.02em; }

/* Scrollbar */
.page::-webkit-scrollbar, .list::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-thumb, .list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
.page::-webkit-scrollbar-track, .list::-webkit-scrollbar-track { background: transparent; }

/* Pages */
.page { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; transition: opacity .3s, visibility .3s; opacity: 1; visibility: visible; }
.page.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* --- Header --- */
#header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--header-h); display: flex; align-items: center; justify-content: center; background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); transform: translateY(-100%); transition: transform .4s var(--ease-out); }
body.ui-visible #header { transform: translateY(0); }
.header-inner { width: 100%; max-width: var(--content-max-w); padding: 0 var(--space-l); display: flex; align-items: center; justify-content: space-between; }
#header .title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center; margin: 0 var(--space-m); opacity: 0.9; }
.icon-btn { background: none; border: none; color: var(--text); font-size: 20px; padding: var(--space-s); cursor: pointer; border-radius: 50%; transition: transform var(--trans-fast), background .2s; display: flex; align-items: center; justify-content: center; }
.icon-btn:active { transform: scale(0.9); background: rgba(128,128,128,0.1); }
.header-actions { display: flex; gap: var(--space-xs); }

/* --- Content --- */
#content-wrapper { max-width: var(--content-max-w); margin: 0 auto; padding: calc(var(--header-h) + 50px) var(--space-l) 100px; font-size: 18px; line-height: 1.9; min-height: 100%; }
#content-wrapper p { text-indent: 2em; margin-bottom: 1.4em; text-align: justify; }
#content-wrapper .chapter-title { font-size: 22px; font-weight: 700; text-align: center; margin: 3em 0 1em; padding-bottom: 16px; color: var(--accent); scroll-margin-top: calc(var(--header-h) + 40px); position: relative; letter-spacing: 0.05em; }
#content-wrapper .chapter-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--accent); border-radius: 2px; opacity: 0.6; }

/* --- Overlays & Drawers --- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; opacity: 0; visibility: hidden; transition: opacity .3s; backdrop-filter: blur(2px); }
.overlay.active { opacity: 1; visibility: visible; }
.drawer { position: fixed; background: var(--bg); z-index: 210; transition: transform .4s var(--ease-out); display: flex; flex-direction: column; }
#drawer-toc { top: 0; left: 0; bottom: 0; width: 85%; max-width: 340px; transform: translateX(-100%); box-shadow: 4px 0 32px rgba(0,0,0,0.1); }
#drawer-toc.active { transform: translateX(0); }
#drawer-toc .header { padding: var(--space-l); border-bottom: 1px solid var(--card-border); font-size: 18px; font-weight: 700; padding-top: calc(var(--space-l) + var(--sat)); letter-spacing: 0.05em; }
#drawer-toc .list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: var(--space-m); }
#drawer-toc .item { padding: 16px; border-radius: var(--radius-s); font-size: 15px; color: var(--text-sub); cursor: pointer; white-space: normal; line-height: 1.5; margin-bottom: var(--space-s); transition: all .2s; }
#drawer-toc .item:hover { background: var(--card); color: var(--text); }
#drawer-toc .item.active { background: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 4px 12px var(--accent-glow); }

#drawer-settings { left: 0; right: 0; bottom: 0; z-index: 210; border-radius: var(--radius-l) var(--radius-l) 0 0; transform: translateY(100%); padding: 32px; padding-bottom: calc(32px + var(--sab)); max-width: 540px; margin: 0 auto; box-shadow: 0 -8px 40px rgba(0,0,0,0.1); border-top: 1px solid var(--card-border); }
#drawer-settings.active { transform: translateY(0); }

/* --- Settings Controls --- */
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
.setting-label { font-size: 15px; color: var(--text-sub); font-weight: 500; }
.setting-btns { display: flex; gap: 12px; align-items: center; }
.btn-pseudo { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--card-border); background: var(--card); color: var(--text); font-size: 14px; cursor: pointer; transition: all .2s; font-weight: 500; }
.btn-pseudo:hover { border-color: var(--accent); color: var(--accent); }
.btn-pseudo.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-pseudo:active { transform: scale(0.95); }

/* --- Themes Dots --- */
.theme-dots { display: flex; gap: 20px; }
.theme-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; position: relative; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.theme-dot:hover { transform: scale(1.1); }
.theme-dot.active { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 0 0 4px var(--accent-glow); }
.theme-dot[data-t="default"] { background: #F4F1EA; border: 1px solid #ddd; }
.theme-dot[data-t="dark"] { background: #000000; border: 1px solid #333; }

/* --- Bookshelf UI --- */
#bookshelf { padding: var(--space-l); padding-top: calc(var(--space-l) + var(--sat)); max-width: 860px; margin: 0 auto; }
.shelf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: var(--space-m); }
.shelf-header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; flex-shrink: 0; color: var(--text); }
.btn-primary { padding: 10px 24px; border-radius: 24px; background: var(--text); color: var(--bg); border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; box-shadow: 0 8px 16px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 8px; }
.btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 8px rgba(0,0,0,0.12); }
.btn-ghost { padding: 8px 16px; border-radius: 20px; background: transparent; color: var(--text-sub); border: 1px solid var(--card-border); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; }
.btn-ghost:active { background: var(--card-border); transform: scale(0.96); }

.book-list { display: flex; flex-direction: column; gap: 16px; }
.book-item { background: var(--card); border-radius: var(--radius-m); border: 1px solid var(--card-border); display: flex; align-items: center; overflow: hidden; transition: all .3s; height: 80px; position: relative; box-shadow: var(--shadow-card); }
.book-item:active { transform: scale(0.99); background: rgba(128,128,128,0.03); }
.btn-spine { width: 14px; height: 100%; border: none; background: var(--text); border-radius: var(--radius-m) 0 0 var(--radius-m); cursor: pointer; transition: width .3s, background .3s; display: flex; align-items: center; justify-content: center; color: var(--bg); opacity: 0.8; }
.btn-spine:hover { width: 20px; background: var(--accent); color: #fff; }
.book-main { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; padding: 0 var(--space-m); cursor: pointer; height: 100%; }
.book-name { font-size: 17px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.02em; }
.progress-info { display: flex; flex-direction: column; justify-content: flex-end; gap: 6px; }
.progress-text { font-size: 12px; color: var(--text-sub); height: 14px; line-height: 14px; letter-spacing: 0.01em; }
.progress-bar { width: 100%; height: 3px; background: var(--card-border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width .4s var(--ease-out); }

/* --- Action Icons --- */
.book-actions { display: flex; flex-direction: column; gap: 6px; padding: 0 var(--space-m) 0 var(--space-s); height: 100%; justify-content: center; }
.btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-sub); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
.btn-icon:hover { background: var(--card); color: var(--text); }
.btn-icon.delete { color: #ff4757; }
.btn-icon.delete:hover { background: rgba(255, 71, 87, 0.08); }

/* --- Loading --- */
#loading-mask { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 15px; color: var(--text-sub); transition: opacity .3s; gap: 20px; backdrop-filter: blur(10px); }
#loading-mask.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--card-border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) { 
  #content-wrapper { font-size: 16px; padding-left: var(--space-m); padding-right: var(--space-m); line-height: 1.8; } 
  .shelf-header h1 { font-size: 26px; } 
  .book-name { font-size: 16px; }
  .btn-spine { width: 12px; }
}
</style>
</head>
<body>

<!-- Loading Mask -->
<div id="loading-mask" class="hidden"><div class="spinner"></div><div id="loading-text">加载中...</div></div>

<!-- Bookshelf Page -->
<div id="bookshelf" class="page">
  <header class="shelf-header">
    <h1>我的书架</h1>
    <div class="header-btns">
      <button class="btn-ghost" onclick="App.clearCache()">清理缓存</button>
      <button class="btn-primary" onclick="document.getElementById('file-input').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        导入
      </button>
    </div>
  </header>
  <input type="file" id="file-input" accept=".txt,.TXT,text/plain" hidden>
  <div class="book-list" id="book-list"></div>
</div>

<!-- Reader Page -->
<div id="reader" class="page hidden">
  <header id="header">
    <div class="header-inner">
      <button class="icon-btn" onclick="App.exitReader()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div class="title" id="header-title">准备中...</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="UI.toggleTheme()" title="切换模式"></button>
        <button class="icon-btn" onclick="UI.openSettings()" title="设置" style="font-weight: 700; font-size: 15px;">Aa</button>
        <button class="icon-btn" onclick="UI.toggleTOC()" title="目录">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
    </div>
  </header>
  <main id="content-wrapper"></main>
</div>

<!-- Drawers -->
<div class="overlay" id="overlay" onclick="UI.closeDrawers()"></div>
<aside id="drawer-toc" class="drawer"><div class="header">目录</div><div class="list" id="toc-list"></div></aside>
<div id="drawer-settings" class="drawer">
  <div class="setting-row"><span class="setting-label">字号</span><div class="setting-btns"><button class="btn-pseudo" onclick="UI.adjustFont(-1)">A-</button><span id="font-display" style="min-width: 30px; text-align: center; font-weight: 600;">18</span><button class="btn-pseudo" onclick="UI.adjustFont(1)">A+</button></div></div>
  <div class="setting-row"><span class="setting-label">行距</span><div class="setting-btns"><button class="btn-pseudo" onclick="UI.setLineHeight(1.6)">紧凑</button><button class="btn-pseudo active" onclick="UI.setLineHeight(1.9)">适中</button><button class="btn-pseudo" onclick="UI.setLineHeight(2.2)">宽松</button></div></div>
  <div class="setting-row"><span class="setting-label">字体</span><div class="setting-btns"><button class="btn-pseudo active" id="font-sans-btn" onclick="UI.setFont('sans')">无衬线</button><button class="btn-pseudo" id="font-serif-btn" onclick="UI.setFont('serif')">衬线</button></div></div>
  <div class="setting-row"><span class="setting-label">主题</span><div class="theme-dots"><div class="theme-dot active" data-t="default" onclick="UI.setTheme('default')"></div><div class="theme-dot" data-t="dark" onclick="UI.setTheme('dark')"></div></div></div>
</div>

<script>
// --- 1. Constants & Config ---
const CONFIG = {
    DB_NAME: 'ReaderCache', DB_VER: 2,
    BUFFER: 40,
    PARSER_REGEX: /^\s*(第[零一二三四五六七八九十百千万0-9]+[章节回部集卷][^。\n]{0,15}?)\s*$/i
};

// Worker Code as a Constant (v1.3 Modularization)
const WORKER_SRC = `
    const REGEX = ${CONFIG.PARSER_REGEX.toString()};
    self.onmessage = function(e) {
        const { text, fileName } = e.data;
        try {
            const lines = text.split(/\r?\n/);
            const paragraphs = [], chMap = []; 
            let currentChapterIdx = -1;
            let wordCount = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const trimmed = lines[i].trim();
                if (!trimmed) continue;
                
                const match = trimmed.match(REGEX);
                if (match) {
                    currentChapterIdx++;
                    const gIdx = paragraphs.length;
                    chMap.push({ chapterIdx: currentChapterIdx, globalIdx: gIdx, title: match[1].trim() });
                    paragraphs.push({ type: 'h2', text: match[1].trim(), chapterIdx: currentChapterIdx, globalIdx: gIdx });
                } else {
                    if (currentChapterIdx === -1) {
                        currentChapterIdx = 0; 
                        chMap.push({ chapterIdx: 0, globalIdx: 0, title: '前言' }); 
                        paragraphs.push({ type: 'h2', text: '前言', chapterIdx: 0, globalIdx: 0 });
                    }
                    const gIdx = paragraphs.length;
                    paragraphs.push({ type: 'p', text: trimmed, chapterIdx: currentChapterIdx, globalIdx: gIdx });
                    wordCount += trimmed.length;
                }
            }
            self.postMessage({ success: true, paragraphs, chMap, bookName: fileName.replace(/\.(txt|TXT)$/i, ''), wordCount });
        } catch (err) { self.postMessage({ success: false, error: err.message }); }
    };
`;

// --- 2. State Management (v1.3) ---
const Store = {
    book: { id: null, name: null, paragraphs: [], chMap: [], total: 0 },
    reader: { gIdx: 0, cIdx: 0, vpStart: 0, vpEnd: 0 },
    settings: { theme: 'default', fontMode: 'sans', fontSize: 18, lineHeight: 1.9, prevTheme: 'default' },
    ui: { isMenuVisible: false }
};

const Utils = {
    escapeHtml: (s) => s ? s.replace(/[&<>"'\/`]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#x2F;','`':'&#x60;'}[m])) : '',
    parseText: (text, name) => new Promise((resolve, reject) => {
        const blob = new Blob([WORKER_SRC], {type: 'application/javascript'});
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = (e) => { worker.terminate(); e.data.success ? resolve(e.data) : reject(new Error(e.data.error)); };
        worker.onerror = (e) => { worker.terminate(); reject(e); };
        worker.postMessage({ text, fileName: name });
    })
};

const API = {
    list: () => fetch('/api/books').then(r => r.json()),
    meta: (id) => fetch(`/api/books/${id}`).then(r => r.json()),
    content: (id) => fetch(`/api/books/${id}/content`).then(r => r.text()),
    create: (fd) => fetch('/api/books', { method:'POST', body: fd }).then(r => r.json()),
    progress: (id, d) => fetch(`/api/books/${id}/progress`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d), keepalive: true }),
    pin: (id) => fetch(`/api/books/${id}/pin`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:'{}' }),
    del: (id) => fetch(`/api/books/${id}`, { method:'DELETE' })
};

const DB = {
    init: () => new Promise((resolve, reject) => {
        const r = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VER);
        r.onupgradeneeded = e => { if(!e.target.result.objectStoreNames.contains('books')) e.target.result.createObjectStore('books', {keyPath:'id'}); };
        r.onsuccess = e => { DB.db = e.target.result; resolve(); };
        r.onerror = e => reject(e);
    }),
    get: (id) => new Promise(r => {
        const tx = DB.db.transaction('books', 'readonly');
        const req = tx.objectStore('books').get(id);
        req.onsuccess = () => r(req.result); req.onerror = () => r(null);
    }),
    set: (id, data) => new Promise(r => {
        const tx = DB.db.transaction('books', 'readwrite');
        tx.objectStore('books').put({ id, ...data, timestamp: Date.now() });
        tx.oncomplete = () => r();
    }),
    del: (id) => new Promise(r => { const tx = DB.db.transaction('books', 'readwrite'); tx.objectStore('books').delete(id); tx.oncomplete = () => r(); }),
    clear: () => new Promise(r => { const tx = DB.db.transaction('books', 'readwrite'); tx.objectStore('books').clear(); tx.oncomplete = () => r(); })
};

// --- 3. Logic Controller ---
const App = {
    async loadShelf() {
        const books = await API.list();
        const list = document.getElementById('book-list');
        if (!books || !books.length) { list.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-sub)">书架空空如也<br>点击右上角导入书籍</div>'; return; }
        list.innerHTML = books.map(b => {
            const pct = Math.min(100, Math.round(((b.progress_gidx||0)+1)/(b.total_paragraphs||1)*100));
            return `
            <div class="book-item" data-id="${Utils.escapeHtml(b.id)}">
                <button class="btn-spine" onclick="App.pin('${Utils.escapeHtml(b.id)}')" title="置顶"></button>
                <div class="book-main" onclick="App.openBook('${Utils.escapeHtml(b.id)}')">
                    <div class="book-name">${Utils.escapeHtml(b.name)}</div>
                    <div class="progress-info">
                        <span class="progress-text">${Utils.escapeHtml(b.current_chapter_title||'未开始')} (${pct}%)</span>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>
                <div class="book-actions">
                    <button class="btn-icon" onclick="App.refresh('${Utils.escapeHtml(b.id)}')" title="刷新">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                    <button class="btn-icon delete" onclick="App.del('${Utils.escapeHtml(b.id)}')" title="删除">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </div>`;
        }).join('');
    },

    async openBook(id) {
        Store.book.id = id;
        UI.showLoading('正在加载书籍...');
        try {
            // 1. Try Cache
            let cached = await DB.get(id);
            let freshMeta = null;
            
            try { freshMeta = await API.meta(id); } catch(e){}
            
            const useCache = cached && cached.timestamp && (Date.now() - cached.timestamp < 300000);
            
            if (useCache && freshMeta) {
                Store.book.paragraphs = cached.paragraphs;
                Store.book.chMap = cached.chMap;
                Store.book.total = cached.paragraphs.length;
                Store.book.name = cached.name;
                Store.reader.gIdx = freshMeta.progress_gidx || 0;
            } else {
                // 2. Network & Parse
                const [meta, text] = await Promise.all([API.meta(id), API.content(id)]);
                const parsed = await Utils.parseText(text, meta.name);
                
                Store.book.paragraphs = parsed.paragraphs;
                Store.book.chMap = parsed.chMap;
                Store.book.total = parsed.paragraphs.length;
                Store.book.name = parsed.bookName;
                Store.reader.gIdx = meta.progress_gidx || 0;
                
                await DB.set(id, { paragraphs: parsed.paragraphs, chMap: parsed.chMap, name: parsed.bookName });
            }
            
            UI.enterReader();
        } catch(e) { alert('加载失败:'+e.message); UI.hideLoading(); document.getElementById('bookshelf').classList.remove('hidden'); }
    },

    async import(file) {
        UI.showLoading('正在本地解析...');
        try {
            const text = await file.text();
            const parsed = await Utils.parseText(text, file.name);
            const id = crypto.randomUUID();
            
            await DB.set(id, { paragraphs: parsed.paragraphs, chMap: parsed.chMap, name: parsed.bookName });
            
            UI.showLoading('正在上传...');
            const fd = new FormData();
            fd.append('file', file);
            fd.append('metadata', JSON.stringify({
                id, name: parsed.bookName, wordCount: parsed.wordCount, totalChapters: parsed.chMap.length, totalParagraphs: parsed.paragraphs.length, chMap: JSON.stringify(parsed.chMap), firstChapterTitle: parsed.chMap[0]?.title||'开始'
            }));
            await API.create(fd);
            await App.loadShelf();
        } catch(e) { alert('导入失败:'+e.message); } finally { UI.hideLoading(); }
    },

    pin: async (id) => { await API.pin(id); await App.loadShelf(); },
    del: async (id) => { if(confirm('确定删除？')){ await DB.del(id); await API.del(id); await App.loadShelf(); }},
    refresh: async (id) => { 
        UI.showLoading('刷新中...'); 
        await DB.del(id); 
        await App.openBook(id); 
        UI.hideLoading(); 
        document.getElementById('bookshelf').classList.remove('hidden');
    },
    clearCache: async () => {
        if(confirm('清理本地缓存？')){ await DB.clear(); alert('已清理'); }
    },
    exitReader: () => {
        App.saveProgress();
        Store.book = { id:null, paragraphs:[], chMap:[], total:0 };
        UI.exitReader();
    },
    saveProgress: () => {
        if(!Store.book.id) return;
        const gIdx = UI.calcGIdx();
        const c = Store.book.chMap.find(ch => ch.chapterIdx === Store.reader.cIdx);
        API.progress(Store.book.id, { progressGidx: gIdx, currentChapterTitle: c?.title||'' });
    }
};

// --- 4. UI Controller ---
const UI = {
    els: {},
    init: () => {
        Object.keys(UI).forEach(k => { if(k.startsWith('el')) UI.els[k] = document.getElementById(k.slice(2)); });
        UI.loadSettings();
        document.getElementById('file-input').onchange = e => { if(e.target.files[0]) App.import(e.target.files[0]); e.target.value=''; };
        
        // Reader Events
        const r = document.getElementById('reader');
        let scrollT;
        r.addEventListener('scroll', () => {
            clearTimeout(scrollT);
            scrollT = setTimeout(() => {
                const gIdx = UI.calcGIdx();
                const c = Store.book.chMap[ch => ch.globalIdx <= gIdx]; // Simplified search
                // Real search logic below
                let l=0, rLen=Store.book.chMap.length-1;
                while(l<=rLen){ let mid=(l+rLen)>>1; if(Store.book.chMap[mid].globalIdx<=gIdx)l=mid+1; else rLen=mid-1; }
                const ch = Store.book.chMap[rLen]||{chapterIdx:0};
                
                if(ch.chapterIdx !== Store.reader.cIdx) {
                    Store.reader.cIdx = ch.chapterIdx;
                    UI.updateHeader();
                }
                Store.reader.gIdx = gIdx;
                App.saveProgress();
            }, 50);
        }, {passive:true});
    },
    
    enterReader: () => {
        document.getElementById('bookshelf').classList.add('hidden');
        document.getElementById('reader').classList.remove('hidden');
        const gIdx = Math.min(Store.reader.gIdx, Store.book.total-1);
        Store.reader.cIdx = Store.book.chMap.find(c => c.globalIdx <= gIdx)?.chapterIdx || 0;
        
        UI.updateHeader();
        UI.renderTOC();
        UI.renderContent(gIdx);
        UI.hideLoading();
    },
    
    exitReader: () => {
        document.getElementById('reader').classList.add('hidden');
        document.getElementById('bookshelf').classList.remove('hidden');
        App.loadShelf();
    },

    // --- Virtual Scroll ---
    renderContent: (centerIdx) => {
        const w = document.getElementById('content-wrapper');
        w.innerHTML = '';
        const sTop = document.createElement('div'); sTop.id='s-top'; sTop.style.height='1px'; w.appendChild(sTop);
        const sBot = document.createElement('div'); sBot.id='s-bot'; sBot.style.height='1px'; 
        
        Store.reader.vpStart = Math.max(0, centerIdx - CONFIG.BUFFER);
        Store.reader.vpEnd = Math.min(Store.book.total - 1, centerIdx + CONFIG.BUFFER);
        
        const f = document.createDocumentFragment();
        Store.book.paragraphs.slice(Store.reader.vpStart, Store.reader.vpEnd+1).forEach((p, i) => {
            const el = document.createElement(p.type==='h2'?'h2':'p');
            el.className = p.type==='h2'?'chapter-title':'';
            el.textContent = p.text; el.dataset.gidx = Store.reader.vpStart+i;
            f.appendChild(el);
        });
        w.appendChild(f);
        w.appendChild(sBot);
        
        UI.setupObserver();
        setTimeout(() => w.querySelector(`[data-gidx="${centerIdx}"]`)?.scrollIntoView({block:'start'}), 50);
    },
    
    setupObserver: () => {
        if(UI.obTop) UI.obTop.disconnect(); if(UI.obBot) UI.obBot.disconnect();
        const r = document.getElementById('reader');
        UI.obBot = new IntersectionObserver((e) => { if(e[0].isIntersecting && Store.reader.vpEnd < Store.book.total-1) UI.loadMore(1); }, {root:r, rootMargin:'150%'});
        UI.obBot.observe(document.getElementById('s-bot'));
        UI.obTop = new IntersectionObserver((e) => { if(e[0].isIntersecting && Store.reader.vpStart > 0) UI.loadMore(-1); }, {root:r, rootMargin:'150%'});
        UI.obTop.observe(document.getElementById('s-top'));
    },
    
    loadMore: (dir) => {
        const w = document.getElementById('content-wrapper');
        if(dir === 1) {
            const newEnd = Math.min(Store.book.total-1, Store.reader.vpEnd + CONFIG.BUFFER);
            if(newEnd === Store.reader.vpEnd) return;
            const f = document.createDocumentFragment();
            Store.book.paragraphs.slice(Store.reader.vpEnd+1, newEnd+1).forEach((p,i) => {
                const el = document.createElement(p.type==='h2'?'h2':'p');
                el.className = p.type==='h2'?'chapter-title':'';
                el.textContent = p.text; el.dataset.gidx = Store.reader.vpEnd+1+i;
                f.appendChild(el);
            });
            w.insertBefore(f, document.getElementById('s-bot'));
            Store.reader.vpEnd = newEnd;
        } else {
            const newStart = Math.max(0, Store.reader.vpStart - CONFIG.BUFFER);
            if(newStart === Store.reader.vpStart) return;
            const f = document.createDocumentFragment();
            Store.book.paragraphs.slice(newStart, Store.reader.vpStart).forEach((p,i) => {
                const el = document.createElement(p.type==='h2'?'h2':'p');
                el.className = p.type==='h2'?'chapter-title':'';
                el.textContent = p.text; el.dataset.gidx = newStart+i;
                f.appendChild(el);
            });
            const oldH = w.scrollHeight;
            w.insertBefore(f, document.getElementById('s-top').nextSibling);
            Store.reader.vpStart = newStart;
            document.getElementById('reader').scrollTop += (w.scrollHeight - oldH);
        }
        UI.cleanupDOM();
    },
    
    cleanupDOM: () => {
        const w = document.getElementById('content-wrapper');
        let n = document.getElementById('s-top').nextSibling;
        while(n && n.id!=='s-bot') { if(parseInt(n.dataset.gidx) < Store.reader.vpStart) { let x=n.nextSibling; w.removeChild(n); n=x; } else break; }
        n = document.getElementById('s-bot').previousSibling;
        while(n && n.id!=='s-top') { if(parseInt(n.dataset.gidx) > Store.reader.vpEnd) { let x=n.previousSibling; w.removeChild(n); n=x; } else break; }
    },

    // --- Helpers ---
    calcGIdx: () => {
        const r = document.getElementById('reader');
        const top = r.scrollTop + 60;
        let gIdx = Store.reader.vpStart;
        Array.from(document.getElementById('content-wrapper').children).forEach(n => {
            if(n.id==='s-top'||n.id==='s-bot') return;
            if(n.offsetTop <= top) gIdx = parseInt(n.dataset.gIdx);
        });
        return gIdx;
    },
    
    updateHeader: () => {
        const t = Store.book.chMap.find(c => c.chapterIdx === Store.reader.cIdx)?.title || '阅读中';
        document.getElementById('header-title').textContent = t;
        document.querySelectorAll('#toc-list .item').forEach((el,i) => el.classList.toggle('active', i === Store.reader.cIdx));
    },
    
    renderTOC: () => {
        document.getElementById('toc-list').innerHTML = Store.book.chMap.map((ch,i) => 
            `<div class="item" data-idx="${i}" onclick="UI.jumpTo(${i})">${Utils.escapeHtml(ch.title)}</div>`
        ).join('');
    },
    
    jumpTo: (cIdx) => {
        const ch = Store.book.chMap[cIdx];
        if(!ch) return;
        Store.reader.cIdx = cIdx;
        UI.closeDrawers();
        document.body.classList.remove('ui-visible');
        UI.renderContent(ch.globalIdx);
    },

    // --- Settings & Theming ---
    loadSettings: () => {
        const s = JSON.parse(localStorage.getItem('reader_settings_v13') || '{}');
        Store.settings = { ...Store.settings, ...s };
        UI.applySettings();
    },
    
    saveSettings: () => {
        localStorage.setItem('reader_settings_v13', JSON.stringify(Store.settings));
    },
    
    applySettings: () => {
        document.documentElement.setAttribute('data-theme', Store.settings.theme);
        document.documentElement.setAttribute('data-font', Store.settings.fontMode);
        document.getElementById('content-wrapper').style.fontSize = Store.settings.fontSize + 'px';
        document.getElementById('content-wrapper').style.lineHeight = Store.settings.lineHeight;
        document.getElementById('font-display').textContent = Store.settings.fontSize;
        
        document.querySelectorAll('.theme-dot').forEach(el => el.classList.toggle('active', el.dataset.t === Store.settings.theme));
        document.querySelectorAll('[onclick^="UI.setLineHeight"]').forEach(el => el.classList.toggle('active', el.getAttribute('onclick').includes(Store.settings.lineHeight)));
        document.getElementById('font-sans-btn').classList.toggle('active', Store.settings.fontMode === 'sans');
        document.getElementById('font-serif-btn').classList.toggle('active', Store.settings.fontMode === 'serif');
    },
    
    setTheme: (t) => {
        if(t==='dark') Store.settings.prevTheme = Store.settings.theme;
        Store.settings.theme = t;
        UI.applySettings(); UI.saveSettings();
    },
    toggleTheme: () => UI.setTheme(Store.settings.theme==='dark'?Store.settings.prevTheme:'dark'),
    
    setFont: (m) => {
        Store.settings.fontMode = m;
        UI.applySettings(); UI.saveSettings();
    },
    
    setLineHeight: (h) => {
        Store.settings.lineHeight = h;
        UI.applySettings(); UI.saveSettings();
    },
    
    adjustFont: (d) => {
        Store.settings.fontSize = Math.max(12, Math.min(32, Store.settings.fontSize + d));
        UI.applySettings(); UI.saveSettings();
    },

    // --- Menus ---
    toggleTOC: () => {
        const el = document.getElementById('drawer-toc');
        const active = el.classList.contains('active');
        UI.closeDrawers();
        if(!active) { document.getElementById('overlay').classList.add('active'); el.classList.add('active'); }
    },
    openSettings: () => {
        const el = document.getElementById('drawer-settings');
        const active = el.classList.contains('active');
        UI.closeDrawers();
        if(!active) { document.getElementById('overlay').classList.add('active'); el.classList.add('active'); }
    },
    closeDrawers: () => {
        document.getElementById('overlay').classList.remove('active');
        document.querySelectorAll('.drawer').forEach(el => el.classList.remove('active'));
    },
    showLoading: (t) => {
        document.getElementById('loading-text').textContent = t;
        document.getElementById('loading-mask').classList.remove('hidden');
    },
    hideLoading: () => {
        document.getElementById('loading-mask').classList.add('hidden');
    }
};

// Boot
(async () => {
    await DB.init();
    UI.init();
    await App.loadShelf();
    
    // Touch toggle
    document.getElementById('content-wrapper').addEventListener('click', e => {
        if(window.getSelection().toString()) return;
        if(Date.now() - (UI.lastClick||0) < 300) return;
        UI.lastClick = Date.now();
        document.body.classList.toggle('ui-visible');
    });
})();
</script>
